<ion-card button="true">
  <ion-button class="moviecard__like-btn" shape="round" translucent="true">
    <ion-icon slot="icon-only" name="heart-outline" close-icon="heart"></ion-icon>
  </ion-button>
  <img alt="Movie poster" src="https://image.tmdb.org/t/p/original/{{ movie.poster_path }}" />
  <ion-card-header>
    <ion-card-title>{{ movie.title }}</ion-card-title>
    <ion-card-subtitle>{{ movie.vote_average }}</ion-card-subtitle>
  </ion-card-header>

  <ion-card-content>
    {{ movie.overview }}
  </ion-card-content>
</ion-card>
